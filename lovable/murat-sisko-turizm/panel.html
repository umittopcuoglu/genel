<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Murat Şişko Turizm — Yönetim Paneli</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,400&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FAF6EE;--bg-2:#F1EADB;--card:#FFFFFF;
    --gold:#B8893A;--gold-2:#D4A84B;--gold-soft:#F5E6C4;
    --emerald:#1F6B47;--emerald-2:#2E8A60;
    --danger:#C0392B;--warn:#D68910;
    --ink:#1A1A1F;--ink-2:#3D3D45;--muted:#7A746B;
    --line:rgba(184,137,58,.22);--line-soft:rgba(40,30,15,.08);
    --shadow:rgba(40,30,15,.08);--shadow-lg:rgba(40,30,15,.14);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:var(--bg);color:var(--ink);
    font-family:'DM Sans',system-ui,sans-serif;
    min-height:100vh;
  }
  ::selection{background:var(--gold);color:#fff}

  /* LOGIN */
  .login-screen{
    position:fixed;inset:0;z-index:100;
    background:radial-gradient(ellipse at center,var(--gold-soft) 0%,var(--bg) 70%);
    display:flex;align-items:center;justify-content:center;padding:24px;
  }
  .login-box{
    background:var(--card);border:1px solid var(--line-soft);
    border-radius:24px;padding:48px;max-width:420px;width:100%;
    text-align:center;
    box-shadow:0 30px 80px var(--shadow-lg);
  }
  .login-logo{
    font-family:'Playfair Display',serif;font-size:28px;font-weight:600;
    margin-bottom:8px;
  }
  .login-logo em{color:var(--gold);font-style:italic;font-weight:400}
  .login-sub{color:var(--muted);font-size:14px;margin-bottom:32px;letter-spacing:1px}
  .login-box input{
    width:100%;background:var(--bg);color:var(--ink);
    border:1px solid var(--line-soft);border-radius:12px;
    padding:16px;font-size:15px;font-family:inherit;margin-bottom:14px;
    transition:all .3s;
  }
  .login-box input:focus{outline:none;border-color:var(--gold);background:#fff}
  .login-box button{
    width:100%;background:linear-gradient(135deg,var(--gold),var(--gold-2));
    color:#fff;padding:16px;border-radius:12px;
    font-weight:700;font-size:14px;letter-spacing:1px;text-transform:uppercase;
    border:none;cursor:pointer;transition:all .3s;
    box-shadow:0 8px 20px rgba(184,137,58,.3);
  }
  .login-box button:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(201,162,39,.4)}
  .login-hint{color:var(--muted);font-size:12px;margin-top:18px}
  .login-err{color:var(--danger);font-size:13px;margin-top:10px;display:none}

  /* LAYOUT */
  .panel{display:none}
  .panel.active{display:block}

  .topbar{
    position:sticky;top:0;z-index:50;
    background:rgba(250,246,238,.92);backdrop-filter:blur(20px);
    border-bottom:1px solid var(--line-soft);
    padding:16px 40px;
    display:flex;align-items:center;justify-content:space-between;
    box-shadow:0 2px 16px var(--shadow);
  }
  .brand{
    font-family:'Playfair Display',serif;font-size:20px;font-weight:600;
    display:flex;align-items:center;gap:10px;
  }
  .brand em{color:var(--gold);font-style:italic;font-weight:400}
  .brand::before{content:"";width:8px;height:8px;border-radius:50%;background:var(--gold);box-shadow:0 0 12px var(--gold)}
  .topbar-right{display:flex;align-items:center;gap:16px}
  .topbar a,.topbar button{
    color:var(--ink-2);text-decoration:none;font-size:13px;
    background:#fff;border:1px solid var(--line-soft);
    padding:9px 16px;border-radius:100px;cursor:pointer;
    font-family:inherit;transition:all .25s;letter-spacing:.5px;font-weight:500;
  }
  .topbar a:hover,.topbar button:hover{color:var(--gold);border-color:var(--gold);background:var(--gold-soft)}
  .logout{color:var(--danger) !important;border-color:rgba(192,57,43,.3) !important}
  .logout:hover{background:rgba(192,57,43,.08) !important;border-color:var(--danger) !important}

  main{padding:40px;max-width:1400px;margin:0 auto}

  .page-head{margin-bottom:36px}
  .page-head h1{
    font-family:'Playfair Display',serif;font-size:42px;font-weight:600;
    letter-spacing:-1px;margin-bottom:6px;
  }
  .page-head p{color:var(--muted);font-size:15px}

  /* KPI CARDS */
  .kpi-grid{
    display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-bottom:48px;
  }
  .kpi{
    background:var(--card);border:1px solid var(--line-soft);
    border-radius:18px;padding:24px;position:relative;overflow:hidden;
    transition:all .3s;
    box-shadow:0 6px 20px var(--shadow);
  }
  .kpi:hover{transform:translateY(-3px);border-color:var(--gold);box-shadow:0 16px 32px var(--shadow-lg)}
  .kpi-label{
    color:var(--muted);font-size:11px;letter-spacing:2px;text-transform:uppercase;
    margin-bottom:14px;
  }
  .kpi-val{
    font-family:'Playfair Display',serif;font-size:42px;font-weight:600;
    color:var(--ink);line-height:1;
  }
  .kpi-val small{font-family:'DM Sans';font-size:14px;color:var(--muted);margin-left:6px}
  .kpi-delta{
    margin-top:10px;font-size:12px;color:var(--emerald);font-family:'JetBrains Mono';
  }
  .kpi-icon{
    position:absolute;top:20px;right:20px;
    width:40px;height:40px;border-radius:12px;
    background:rgba(201,162,39,.1);
    display:flex;align-items:center;justify-content:center;
    color:var(--gold);font-size:18px;
  }

  /* SECTION TITLE */
  .sec-head{
    display:flex;align-items:center;justify-content:space-between;
    margin-bottom:24px;
  }
  .sec-head h2{
    font-family:'Playfair Display',serif;font-size:26px;font-weight:600;
  }
  .sec-head .actions{display:flex;gap:10px}
  .btn-sm{
    background:rgba(201,162,39,.1);color:var(--gold);
    border:1px solid var(--line);padding:8px 16px;border-radius:100px;
    font-size:12px;letter-spacing:1px;cursor:pointer;font-family:inherit;
    transition:all .25s;
  }
  .btn-sm:hover{background:var(--gold);color:#fff;border-color:var(--gold)}

  /* TOUR DOLULUK GRID */
  .tour-grid{
    display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:48px;
  }
  .tour-tile{
    background:var(--card);border:1px solid var(--line-soft);
    border-radius:18px;padding:24px;
    transition:all .3s;
    box-shadow:0 6px 20px var(--shadow);
  }
  .tour-tile:hover{border-color:var(--gold);transform:translateY(-3px);box-shadow:0 16px 32px var(--shadow-lg)}
  .tour-tile-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px}
  .tour-tile h3{
    font-family:'Playfair Display',serif;font-size:20px;font-weight:600;
    margin-bottom:4px;
  }
  .tour-tile .meta{color:var(--muted);font-size:12px;letter-spacing:1px}
  .badge{
    padding:5px 12px;border-radius:100px;font-size:10px;font-weight:600;
    letter-spacing:1.5px;text-transform:uppercase;
  }
  .badge.open{background:rgba(43,129,89,.15);color:var(--emerald);border:1px solid rgba(43,129,89,.3)}
  .badge.limited{background:rgba(230,162,60,.15);color:var(--warn);border:1px solid rgba(230,162,60,.3)}
  .badge.full{background:rgba(230,76,92,.15);color:var(--danger);border:1px solid rgba(230,76,92,.3)}

  /* CIRCULAR PROGRESS */
  .ring-wrap{display:flex;align-items:center;gap:20px;margin:14px 0 18px}
  .ring{position:relative;width:96px;height:96px;flex-shrink:0}
  .ring svg{transform:rotate(-90deg)}
  .ring circle{fill:none;stroke-width:8}
  .ring .bg{stroke:var(--bg-2)}
  .ring .fg{stroke:url(#grad);stroke-linecap:round;transition:stroke-dashoffset 1.5s cubic-bezier(.16,1,.3,1)}
  .ring-pct{
    position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    font-family:'JetBrains Mono';font-size:18px;font-weight:600;color:var(--gold);
  }
  .ring-info{flex:1;font-size:13px;color:var(--muted);line-height:1.7}
  .ring-info strong{color:var(--ink);font-size:22px;font-family:'Playfair Display';display:block;margin-bottom:2px}

  .tour-tile .row{
    display:flex;justify-content:space-between;align-items:center;
    padding:10px 0;border-top:1px solid rgba(40,30,15,.06);
    font-size:13px;
  }
  .tour-tile .row span:first-child{color:var(--muted)}
  .tour-tile .row span:last-child{font-family:'JetBrains Mono';color:var(--gold-2)}
  .tour-tile .controls{display:flex;gap:8px;margin-top:14px}
  .tour-tile .controls button{
    flex:1;background:var(--bg-2);color:var(--ink);
    border:1px solid var(--line-soft);padding:9px;border-radius:10px;cursor:pointer;
    font-size:12px;font-family:inherit;transition:all .25s;font-weight:500;
  }
  .tour-tile .controls button:hover{background:var(--gold);color:#fff;border-color:var(--gold)}

  /* REGISTRATIONS TABLE */
  .table-wrap{
    background:var(--card);border:1px solid var(--line-soft);
    border-radius:18px;overflow:hidden;
    box-shadow:0 6px 20px var(--shadow);
  }
  table{width:100%;border-collapse:collapse}
  thead{background:rgba(201,162,39,.04)}
  th{
    text-align:left;padding:18px 20px;
    color:var(--gold);font-size:11px;font-weight:600;
    letter-spacing:2px;text-transform:uppercase;
    border-bottom:1px solid var(--line);
  }
  td{
    padding:16px 20px;font-size:14px;
    border-bottom:1px solid rgba(40,30,15,.06);
  }
  tbody tr{transition:background .25s}
  tbody tr:hover{background:rgba(201,162,39,.04)}
  td.num{font-family:'JetBrains Mono';color:var(--muted)}
  .empty{text-align:center;padding:60px 20px;color:var(--muted)}
  .del-btn{
    background:none;border:1px solid rgba(230,76,92,.3);
    color:var(--danger);padding:6px 12px;border-radius:8px;
    font-size:11px;cursor:pointer;font-family:inherit;letter-spacing:.5px;
    transition:all .25s;
  }
  .del-btn:hover{background:var(--danger);color:#fff}

  @media (max-width:980px){
    .kpi-grid{grid-template-columns:repeat(2,1fr)}
    .tour-grid{grid-template-columns:1fr}
    main{padding:24px 16px}
    .topbar{padding:14px 20px}
    table{font-size:13px}
    th,td{padding:12px 14px}
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <div class="login-logo">Murat Şişko <em>Turizm</em></div>
    <div class="login-sub">YÖNETİM PANELİ</div>
    <input type="text" id="user" placeholder="Kullanıcı adı" autofocus/>
    <input type="password" id="pass" placeholder="Şifre" onkeydown="if(event.key==='Enter')doLogin()"/>
    <button onclick="doLogin()">Giriş Yap</button>
    <div class="login-err" id="loginErr">Hatalı kullanıcı adı veya şifre</div>
    <div class="login-hint">Demo: <code>admin</code> / <code>murat2025</code></div>
  </div>
</div>

<!-- PANEL -->
<div class="panel" id="panel">
  <div class="topbar">
    <div class="brand">Murat Şişko <em>Turizm</em></div>
    <div class="topbar-right">
      <a href="index.html">← Site</a>
      <button onclick="exportCSV()">CSV Dışa Aktar</button>
      <button class="logout" onclick="logout()">Çıkış</button>
    </div>
  </div>

  <main>
    <div class="page-head">
      <h1>Tur Yönetim Paneli</h1>
      <p>Canlı doluluk, kayıt yönetimi ve operasyon takibi</p>
    </div>

    <!-- KPI -->
    <div class="kpi-grid" id="kpiGrid"></div>

    <!-- TOURS -->
    <div class="sec-head">
      <h2>Tur Doluluk Durumu</h2>
      <div class="actions">
        <button class="btn-sm" onclick="renderAll()">↻ Yenile</button>
      </div>
    </div>
    <div class="tour-grid" id="tourGrid"></div>

    <!-- SVG GRADIENT DEF -->
    <svg width="0" height="0" style="position:absolute">
      <defs>
        <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#2B8159"/>
          <stop offset="100%" stop-color="#E6C04A"/>
        </linearGradient>
      </defs>
    </svg>

    <!-- REGISTRATIONS -->
    <div class="sec-head" style="margin-top:48px">
      <h2>Kayıt Listesi</h2>
      <div class="actions">
        <button class="btn-sm" onclick="clearRegs()">Tümünü Temizle</button>
      </div>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Ad Soyad</th>
            <th>Telefon</th>
            <th>E-posta</th>
            <th>Tur</th>
            <th>Kişi</th>
            <th>Tarih</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="regBody"></tbody>
      </table>
    </div>
  </main>
</div>

<script>
  // --- LOGIN ---
  const CRED = {user:'admin', pass:'murat2025'};
  function doLogin(){
    const u = document.getElementById('user').value.trim();
    const p = document.getElementById('pass').value;
    if(u===CRED.user && p===CRED.pass){
      sessionStorage.setItem('mst_admin','1');
      showPanel();
    } else {
      document.getElementById('loginErr').style.display='block';
    }
  }
  function logout(){
    sessionStorage.removeItem('mst_admin');
    location.reload();
  }
  function showPanel(){
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('panel').classList.add('active');
    renderAll();
  }
  if(sessionStorage.getItem('mst_admin')==='1') showPanel();

  // --- DEFAULT TOURS (same as index) ---
  const defaultTours = [
    {title:"Umre Şubat 2026",badge:"Umre",date:"15 Şub – 1 Mar",days:"14 Gün",price:"₺68.500",cap:40,booked:28},
    {title:"Hac 2026 Kafilesi",badge:"Hac",date:"Haziran 2026",days:"32 Gün",price:"₺285.000",cap:50,booked:46},
    {title:"Umre Ramazan 2026",badge:"Umre Özel",date:"Mart 2026",days:"21 Gün",price:"₺92.000",cap:35,booked:35},
    {title:"Konya Mevlana Turu",badge:"Kültür",date:"12 Nisan 2026",days:"3 Gün",price:"₺8.900",cap:45,booked:12},
    {title:"Şanlıurfa Peygamberler Şehri",badge:"Kültür",date:"5 Mayıs 2026",days:"4 Gün",price:"₺11.500",cap:40,booked:22},
    {title:"Umre Yaz 2026",badge:"Umre",date:"Temmuz 2026",days:"14 Gün",price:"₺74.000",cap:45,booked:8},
  ];

  function loadTours(){
    return JSON.parse(localStorage.getItem('mst_tours')||'null') || defaultTours;
  }
  function saveTours(t){localStorage.setItem('mst_tours', JSON.stringify(t))}
  function loadRegs(){return JSON.parse(localStorage.getItem('mst_regs')||'[]')}

  function statusOf(t){
    const pct = (t.booked/t.cap)*100;
    if(pct>=100) return {text:"DOLU",cls:"full"};
    if(pct>=80) return {text:"SON YERLER",cls:"limited"};
    return {text:"AÇIK",cls:"open"};
  }

  function renderKPI(){
    const tours = loadTours();
    const regs = loadRegs();
    const totalCap = tours.reduce((s,t)=>s+t.cap,0);
    const totalBooked = tours.reduce((s,t)=>s+t.booked,0);
    const pct = ((totalBooked/totalCap)*100).toFixed(1);
    const fullTours = tours.filter(t=>t.booked>=t.cap).length;
    const revenue = tours.reduce((s,t)=>{
      const price = parseInt(t.price.replace(/[^\d]/g,''));
      return s + (price * t.booked);
    },0);

    document.getElementById('kpiGrid').innerHTML = `
      <div class="kpi">
        <div class="kpi-icon">◯</div>
        <div class="kpi-label">Aktif Tur</div>
        <div class="kpi-val">${tours.length}</div>
        <div class="kpi-delta">▲ ${fullTours} tur dolu</div>
      </div>
      <div class="kpi">
        <div class="kpi-icon">☷</div>
        <div class="kpi-label">Toplam Kayıt</div>
        <div class="kpi-val">${totalBooked}<small>/ ${totalCap}</small></div>
        <div class="kpi-delta">%${pct} doluluk</div>
      </div>
      <div class="kpi">
        <div class="kpi-icon">✉</div>
        <div class="kpi-label">Yeni Başvuru</div>
        <div class="kpi-val">${regs.length}</div>
        <div class="kpi-delta">Siteden gelen</div>
      </div>
      <div class="kpi">
        <div class="kpi-icon">₺</div>
        <div class="kpi-label">Tahmini Ciro</div>
        <div class="kpi-val">₺${(revenue/1000000).toFixed(1)}M</div>
        <div class="kpi-delta">Tüm kayıtlar</div>
      </div>
    `;
  }

  function renderTours(){
    const tours = loadTours();
    const grid = document.getElementById('tourGrid');
    const C = 2*Math.PI*42; // circumference for r=42
    grid.innerHTML = tours.map((t,i)=>{
      const pct = Math.min(100,(t.booked/t.cap)*100);
      const offset = C - (pct/100)*C;
      const st = statusOf(t);
      const remaining = Math.max(0, t.cap - t.booked);
      return `
      <div class="tour-tile">
        <div class="tour-tile-top">
          <div>
            <h3>${t.title}</h3>
            <div class="meta">${t.badge} · ${t.date}</div>
          </div>
          <span class="badge ${st.cls}">${st.text}</span>
        </div>
        <div class="ring-wrap">
          <div class="ring">
            <svg width="96" height="96">
              <circle class="bg" cx="48" cy="48" r="42"/>
              <circle class="fg" cx="48" cy="48" r="42" stroke-dasharray="${C}" stroke-dashoffset="${offset}"/>
            </svg>
            <div class="ring-pct">%${pct.toFixed(0)}</div>
          </div>
          <div class="ring-info">
            <strong>${t.booked}/${t.cap}</strong>
            ${remaining} koltuk kaldı<br/>
            ${t.days} · ${t.price}
          </div>
        </div>
        <div class="row"><span>Kapasite</span><span>${t.cap} kişi</span></div>
        <div class="row"><span>Kayıt</span><span>${t.booked} kişi</span></div>
        <div class="row"><span>Boş</span><span>${remaining} kişi</span></div>
        <div class="controls">
          <button onclick="adj(${i},1)">+1 Kayıt</button>
          <button onclick="adj(${i},-1)">−1 Kayıt</button>
          <button onclick="reset(${i})">Sıfırla</button>
        </div>
      </div>`;
    }).join('');
  }

  function adj(i,d){
    const tours = loadTours();
    tours[i].booked = Math.max(0, Math.min(tours[i].cap, tours[i].booked + d));
    saveTours(tours);
    renderAll();
  }
  function reset(i){
    const tours = loadTours();
    tours[i].booked = 0;
    saveTours(tours);
    renderAll();
  }

  function renderRegs(){
    const regs = loadRegs();
    const body = document.getElementById('regBody');
    if(!regs.length){
      body.innerHTML = `<tr><td colspan="8" class="empty">Henüz kayıt yok. Ana sayfadan kayıt formu doldurulduğunda burada görünecek.</td></tr>`;
      return;
    }
    body.innerHTML = regs.map((r,i)=>{
      const d = new Date(r.ts);
      const ds = d.toLocaleDateString('tr-TR') + ' ' + d.toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'});
      return `
      <tr>
        <td class="num">${String(i+1).padStart(3,'0')}</td>
        <td><strong>${r.name||'-'}</strong></td>
        <td class="num">${r.phone||'-'}</td>
        <td>${r.email||'-'}</td>
        <td>${r.tour||'-'}</td>
        <td class="num">${r.count||1}</td>
        <td class="num">${ds}</td>
        <td><button class="del-btn" onclick="delReg(${i})">Sil</button></td>
      </tr>`;
    }).join('');
  }

  function delReg(i){
    const regs = loadRegs();
    regs.splice(i,1);
    localStorage.setItem('mst_regs', JSON.stringify(regs));
    renderAll();
  }
  function clearRegs(){
    if(confirm('Tüm kayıtlar silinecek. Emin misin?')){
      localStorage.removeItem('mst_regs');
      renderAll();
    }
  }

  function exportCSV(){
    const regs = loadRegs();
    if(!regs.length){alert('Dışa aktarılacak kayıt yok.');return}
    const headers = ['Ad Soyad','Telefon','E-posta','Tur','Kişi','Notlar','Tarih'];
    const rows = regs.map(r=>[r.name,r.phone,r.email,r.tour,r.count,r.notes||'',r.ts]
      .map(v=>`"${String(v||'').replace(/"/g,'""')}"`).join(','));
    const csv = '﻿' + [headers.join(','),...rows].join('\n');
    const blob = new Blob([csv],{type:'text/csv;charset=utf-8'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `murat-sisko-kayitlar-${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
    URL.revokeObjectURL(url);
  }

  function renderAll(){renderKPI();renderTours();renderRegs()}
</script>
</body>
</html>
