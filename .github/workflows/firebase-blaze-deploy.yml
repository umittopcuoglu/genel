name: Deploy to Firebase Blaze (Cloud Run + Hosting)

on:
  push:
    branches: [main]
    paths:
      - 'hotel/**'
  workflow_dispatch:

env:
  PROJECT_ID: hotelops-216fa
  REGION: europe-west1
  SERVICE_NAME: hotelops-backend
  AR_REPO: hotelops
  IMAGE: europe-west1-docker.pkg.dev/hotelops-216fa/hotelops/backend

jobs:
  deploy-backend:
    name: Build & Deploy Backend to Cloud Run
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Enable required GCP APIs
        continue-on-error: true
        run: |
          gcloud services enable run.googleapis.com \
            artifactregistry.googleapis.com \
            cloudbuild.googleapis.com \
            firebasehosting.googleapis.com \
            --quiet 2>&1 || echo "API enable skipped (enable manually in Cloud Console if needed)"

      - name: Ensure Artifact Registry repo
        run: |
          gcloud artifacts repositories describe ${{ env.AR_REPO }} \
            --location=${{ env.REGION }} 2>/dev/null || \
          gcloud artifacts repositories create ${{ env.AR_REPO }} \
            --repository-format=docker \
            --location=${{ env.REGION }} \
            --quiet

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push Docker image
        working-directory: hotel
        run: |
          docker build -f Dockerfile.cloudrun -t ${{ env.IMAGE }}:${{ github.sha }} .
          docker push ${{ env.IMAGE }}:${{ github.sha }}

      - name: Delete old broken service (fresh deploy)
        continue-on-error: true
        run: |
          gcloud run services delete ${{ env.SERVICE_NAME }} \
            --region=${{ env.REGION }} --quiet 2>/dev/null || true

      - name: Deploy to Cloud Run
        id: deploy
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image=${{ env.IMAGE }}:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --port=8080 \
            --memory=512Mi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=2 \
            --set-env-vars="^@@^DATABASE_URL=sqlite+aiosqlite:///./demo.db@@JWT_SECRET_KEY=${{ secrets.JWT_SECRET }}@@CORS_ORIGINS=https://hotelops-216fa.web.app,https://hotelops-216fa.firebaseapp.com@@DEBUG=true@@ENABLE_RATE_LIMIT=false@@REDIS_URL=" \
            --quiet

      - name: Show Cloud Run logs on failure
        if: failure() && steps.deploy.outcome == 'failure'
        run: |
          echo "=== Recent Cloud Run logs ==="
          gcloud logging read "resource.type=cloud_run_revision AND resource.labels.service_name=${{ env.SERVICE_NAME }}" \
            --limit=50 --format="table(timestamp,textPayload,jsonPayload.message)" \
            --freshness=5m 2>&1 || echo "Could not fetch logs"

      - name: Verify backend health
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region=${{ env.REGION }} --format='value(status.url)')
          echo "Cloud Run URL: $URL"
          sleep 10
          curl -sf "$URL/api/v1/health" || echo "Health check will pass after first request warms up the instance"

  deploy-frontend:
    name: Build & Deploy Frontend to Firebase Hosting
    runs-on: ubuntu-latest
    needs: deploy-backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'hotel/frontend/package-lock.json'

      - name: Install dependencies
        working-directory: hotel/frontend
        run: npm ci || npm install

      - name: Build static export
        working-directory: hotel/frontend
        env:
          NEXT_PUBLIC_API_URL: ""
        run: npx next build

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.GCP_SA_KEY }}
          channelId: live
          projectId: hotelops-216fa
          entryPoint: hotel
