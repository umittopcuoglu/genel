name: Deploy to GitHub Pages

on:
  push:
    branches: [claude/ecstatic-gates-paa35d, main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: hotel/frontend/package-lock.json

      - name: Install dependencies
        working-directory: hotel/frontend
        run: npm ci

      - name: Build static export
        working-directory: hotel/frontend
        env:
          PAGES_BASE_PATH: /genel
        run: npx next build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: hotel/frontend/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
