name: HotelOps Full Stack CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: hotel

jobs:
  backend:
    name: Backend (FastAPI + 270+ pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "hotel/backend/requirements.txt"
      - name: Bağımlılıklar
        run: |
          pip install -r backend/requirements.txt
          pip install aiosqlite fakeredis cryptography
      - name: Test paketi
        run: cd backend && python -m pytest tests/ -q --tb=short
        env:
          ENABLE_LLM_MOCK: "true"

  frontend:
    name: Frontend (Next.js build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "hotel/frontend/package-lock.json"
      - name: Bağımlılıklar
        run: cd frontend && npm ci || npm install
      - name: Type check
        run: cd frontend && npx tsc --noEmit || true
      - name: Production build
        run: cd frontend && npm run build

  security-scan:
    name: Güvenlik taraması
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "hotel"
          ignore-unfixed: true
          severity: "CRITICAL,HIGH"
          exit-code: "0"

  docker-build:
    name: Docker imajı (production)
    runs-on: ubuntu-latest
    needs: [backend]
    steps:
      - uses: actions/checkout@v4
      - name: Buildx kurulumu
        uses: docker/setup-buildx-action@v3
      - name: Backend imajı
        uses: docker/build-push-action@v5
        with:
          context: hotel/backend
          push: false
          tags: hotelops/backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
        continue-on-error: true
      - name: docker-compose syntax kontrolü
        run: docker compose -f docker-compose.prod.yml config >/dev/null
