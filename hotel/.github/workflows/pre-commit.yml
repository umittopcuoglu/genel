name: Pre-commit checks

on:
  push:
    branches: [main, "claude/**"]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Ruff (Python lint)
        run: |
          pip install ruff
          ruff check hotel/backend/app || true
      - name: Yaml lint
        run: |
          pip install yamllint
          yamllint hotel/.github/workflows || true
