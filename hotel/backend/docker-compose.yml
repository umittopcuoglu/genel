version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: hotelops_db
    environment:
      POSTGRES_USER: hotelops
      POSTGRES_PASSWORD: hotelpass
      POSTGRES_DB: hotelops
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hotelops"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: hotelops_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: hotelops_api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://hotelops:hotelpass@db:5432/hotelops
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET_KEY=change_this_secret_key_in_production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
  redis_data:
